# Nginx reverse proxy for Fluxer.
# DOMAIN_PLACEHOLDER is replaced by setup.sh with your actual domain.

events {
    worker_connections 1024;
}

http {
    sendfile            on;
    tcp_nopush          on;
    keepalive_timeout   65;
    types_hash_max_size 2048;

    # Allow large file uploads (images, attachments)
    client_max_body_size 100M;

    access_log /var/log/nginx/access.log;
    error_log  /var/log/nginx/error.log warn;

    # ── HTTP: redirect to HTTPS + serve ACME challenge ──────────────────────
    server {
        listen 80;
        listen [::]:80;
        server_name DOMAIN_PLACEHOLDER;

        # Let's Encrypt / Certbot challenge
        location /.well-known/acme-challenge/ {
            root /var/www/certbot;
        }

        location / {
            return 301 https://$host$request_uri;
        }
    }

    # ── HTTPS: proxy to Fluxer ───────────────────────────────────────────────
    server {
        listen 443 ssl;
        listen [::]:443 ssl;
        http2 on;
        server_name DOMAIN_PLACEHOLDER;

        ssl_certificate     /etc/letsencrypt/live/DOMAIN_PLACEHOLDER/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/DOMAIN_PLACEHOLDER/privkey.pem;

        # Modern SSL settings (Mozilla Intermediate)
        ssl_protocols             TLSv1.2 TLSv1.3;
        ssl_ciphers               ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305:DHE-RSA-AES128-GCM-SHA256;
        ssl_prefer_server_ciphers off;
        ssl_session_timeout       1d;
        ssl_session_cache         shared:MozSSL:10m;
        ssl_session_tickets       off;

        # Security headers
        add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
        add_header X-Frame-Options          SAMEORIGIN always;
        add_header X-Content-Type-Options   nosniff    always;

        # LiveKit WebSocket signaling (proxied through HTTPS for Cloudflare compatibility)
        # Use Docker DNS resolver so nginx handles livekit starting after nginx or restarting
        location /livekit/ {
            resolver 127.0.0.11 valid=10s;
            set $livekit_backend http://livekit:7880;
            rewrite ^/livekit/(.*) /$1 break;
            proxy_pass         $livekit_backend;
            proxy_http_version 1.1;

            proxy_set_header Host              $host;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            proxy_set_header Upgrade    $http_upgrade;
            proxy_set_header Connection "upgrade";

            proxy_read_timeout 86400s;
            proxy_send_timeout 86400s;
        }

        # Media proxy — routed through Caddy to normalize duplicate Content-Length
        # headers that the fluxer server sends (nginx rejects duplicates with 502)
        location /media/ {
            proxy_pass         http://media-proxy:8081;
            proxy_http_version 1.1;

            proxy_set_header Host              $host;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            proxy_read_timeout 300s;
            proxy_send_timeout 300s;
        }

        # Proxy to Fluxer server
        location / {
            proxy_pass         http://fluxer:8080;
            proxy_http_version 1.1;

            proxy_set_header Host              $host;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            # WebSocket support (used by the Fluxer gateway)
            proxy_set_header Upgrade    $http_upgrade;
            proxy_set_header Connection "upgrade";

            # Long timeouts for WebSocket connections and large uploads
            proxy_read_timeout 86400s;
            proxy_send_timeout 86400s;
        }
    }
}
